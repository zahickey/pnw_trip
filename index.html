<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>San Diego → Alaska: The Long Way Up</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
<style>
  :root{
    --parchment:#EDE7D6;
    --ink:#22301F;
    --forest:#2F4A34;
    --forest-dark:#1F3324;
    --rust:#C1502E;
    --teal:#3B6E7E;
    --grey:#8A8272;
    --gold:#B8860B;
    --purple:#6B4A8A;
    --line:#4A5A3F;
    --card-bg:#FBF8EF;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;font-family:'Source Serif 4', serif;background:var(--parchment);color:var(--ink);}
  #map{position:absolute; top:88px; left:0; right:0; bottom:0;}

  header{
    position:absolute; top:0; left:0; right:0; height:88px; z-index:1000;
    background:var(--forest-dark);
    color:var(--parchment);
    display:flex; align-items:center; justify-content:space-between;
    padding:0 24px;
    border-bottom:3px solid var(--rust);
  }
  header .title-block h1{
    font-family:'Oswald', sans-serif;
    font-weight:700;
    font-size:22px;
    letter-spacing:0.03em;
    text-transform:uppercase;
    margin:0;
    line-height:1.15;
  }
  header .title-block p{
    margin:2px 0 0 0;
    font-size:13px;
    color:#C9C2A8;
    font-family:'Source Serif 4', serif;
    font-style:italic;
  }
  header .right-side{ display:flex; align-items:center; gap:26px; }
  header .stats{
    display:flex; gap:22px; font-family:'Oswald', sans-serif;
  }
  header .stats div{ text-align:right; }
  header .stats .num{ font-size:20px; font-weight:600; color:var(--rust); display:block; line-height:1;}
  header .stats .lbl{ font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:#C9C2A8; }

  nav.tabs{ display:flex; gap:6px; }
  nav.tabs a{
    font-family:'Oswald', sans-serif; font-size:12px; letter-spacing:0.06em; text-transform:uppercase;
    color:#C9C2A8; text-decoration:none; padding:8px 14px; border-radius:4px 4px 0 0;
    border:1px solid transparent;
  }
  nav.tabs a.active{ background:var(--parchment); color:var(--forest-dark); font-weight:600; }
  nav.tabs a:not(.active):hover{ background:rgba(255,255,255,0.08); color:var(--parchment); }

  .legend{
    position:absolute; bottom:20px; left:20px; z-index:999;
    background:var(--card-bg);
    border:1px solid #D8CFAF;
    border-radius:4px;
    padding:12px 16px;
    font-family:'Oswald', sans-serif;
    font-size:12px;
    box-shadow:0 3px 10px rgba(0,0,0,0.2);
    max-width:180px;
  }
  .legend h3{
    margin:0 0 8px 0; font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--forest-dark); border-bottom:1px solid #D8CFAF; padding-bottom:6px;
  }
  .legend .row{display:flex; align-items:center; gap:8px; margin-bottom:6px;}
  .legend .dot{width:13px; height:13px; border-radius:50%; flex-shrink:0; border:2px solid rgba(0,0,0,0.25);}
  .legend .row span.label{font-size:12px; color:var(--ink); font-family:'Source Serif 4', serif;}
  .legend .divider{ height:1px; background:#D8CFAF; margin:8px 0; border:none; }
  .legend .row.toggle{
    cursor:pointer; margin-bottom:0; padding:4px 6px; margin:0 -6px; border-radius:4px;
    transition:background 0.15s ease;
  }
  .legend .row.toggle:hover{ background:rgba(0,0,0,0.05); }
  .legend .row.toggle .dot{ opacity:0.35; transition:opacity 0.15s ease, box-shadow 0.15s ease; }
  .legend .row.toggle.active .dot{ opacity:1; }
  .legend .row.toggle span.label{ line-height:1.25; }
  .legend .row.toggle span.label .sub{ display:block; font-size:10px; color:var(--grey); font-style:italic; }
  .legend .row.toggle#stops-toggle .dot{ background:#1A1A1A; }
  .legend .row.toggle#stops-toggle.active .dot{ box-shadow:0 0 0 3px rgba(0,0,0,0.2); }
  .legend .row.toggle#water-toggle .dot{ background:#2E75B6; }
  .legend .row.toggle#water-toggle.active .dot{ box-shadow:0 0 0 3px rgba(46,117,182,0.22); }

  .hint{
    position:absolute; bottom:20px; right:20px; z-index:999;
    background:var(--forest-dark); color:var(--parchment);
    font-family:'Oswald', sans-serif; font-size:11px; letter-spacing:0.03em;
    padding:8px 14px; border-radius:4px; opacity:0.9;
  }

  .stop-badge{
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-family:'Oswald', sans-serif; font-weight:600; font-size:13px;
    width:26px; height:26px; border-radius:50% 50% 50% 0;
    transform:rotate(45deg);
    border:2px solid rgba(255,255,255,0.85);
    box-shadow:0 2px 5px rgba(0,0,0,0.4);
  }
  .stop-badge span{ transform:rotate(-45deg); }

  /* Popup styling */
  .leaflet-popup-content-wrapper{
    background:var(--card-bg);
    border-radius:6px;
    box-shadow:0 6px 20px rgba(0,0,0,0.35);
    overflow:hidden;
  }
  .leaflet-popup-content{ margin:0 !important; width:270px !important; font-family:'Source Serif 4', serif; }
  .leaflet-popup-tip{ background:var(--card-bg); }

  /* Photo gallery */
  .popup-gallery{ position:relative; }
  .gallery-track{
    display:flex; overflow-x:auto; scroll-snap-type:x mandatory;
    scrollbar-width:none; -ms-overflow-style:none;
  }
  .gallery-track::-webkit-scrollbar{ display:none; }
  .popup-photo{
    width:100%; height:130px; object-fit:cover; display:block; flex:0 0 100%;
    scroll-snap-align:start;
    background:linear-gradient(135deg, #D8CFAF, #C9C2A8);
  }
  .gallery-arrow{
    position:absolute; top:50%; transform:translateY(-50%);
    width:24px; height:24px; border-radius:50%; border:none;
    background:rgba(0,0,0,0.45); color:#fff; font-size:16px; line-height:1;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .gallery-arrow.prev{ left:6px; }
  .gallery-arrow.next{ right:6px; }
  .gallery-dots{
    position:absolute; bottom:8px; left:0; right:0;
    display:flex; justify-content:center; gap:5px;
  }
  .gallery-dots .dot{
    width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.6);
    box-shadow:0 0 2px rgba(0,0,0,0.5);
  }
  .gallery-dots .dot.active{ background:#fff; }

  .popup-body{ padding:14px 16px; }
  .popup-eyebrow{
    font-family:'Oswald', sans-serif; font-size:10px; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--rust); margin:0 0 2px 0; font-weight:600;
  }
  .popup-title{
    font-family:'Oswald', sans-serif; font-size:18px; font-weight:600; margin:0 0 6px 0; color:var(--forest-dark); line-height:1.2;
  }
  .popup-dates{ font-size:13px; color:var(--grey); margin:0 0 10px 0; font-style:italic; }
  .popup-stats{
    display:grid; grid-template-columns:1fr 1fr; gap:6px 10px;
    background:#F1ECDA; border-radius:4px; padding:8px 10px; margin-bottom:10px;
    font-family:'Oswald', sans-serif; font-size:11px;
  }
  .popup-stats .stat-lbl{ text-transform:uppercase; letter-spacing:0.05em; color:var(--grey); font-size:9px; display:block;}
  .popup-stats .stat-val{ color:var(--forest-dark); font-size:13px; font-weight:600; }
  .popup-activities-lbl{
    font-family:'Oswald', sans-serif; font-size:10px; text-transform:uppercase; letter-spacing:0.08em; color:var(--teal); margin:0 0 4px 0; font-weight:600;
  }
  .popup-activities{ margin:0; padding-left:18px; font-size:13.5px; line-height:1.5; }
  .popup-activities li{ margin-bottom:2px; }

  .leaflet-tooltip.stop-tooltip{
    font-family:'Oswald', sans-serif; font-weight:600; font-size:12px;
    background:var(--forest-dark); color:var(--parchment); border:none;
    padding:6px 10px 6px 6px; border-radius:4px;
    display:flex; align-items:center; gap:8px;
  }
  .leaflet-tooltip.stop-tooltip::before{ border-top-color:var(--forest-dark); }
  .tooltip-thumb{
    width:34px; height:34px; border-radius:3px; object-fit:cover; flex-shrink:0;
    background:rgba(255,255,255,0.15);
  }

  /* Water-fill stations — separate optional layer */
  .leaflet-tooltip.water-tooltip{
    background:var(--card-bg); color:var(--ink); border:2px solid #2E75B6;
    border-radius:6px; padding:0; width:210px; box-sizing:border-box;
    white-space:normal; word-wrap:break-word; overflow-wrap:break-word;
    box-shadow:0 4px 14px rgba(0,0,0,0.3);
  }
  .leaflet-tooltip.water-tooltip::before{ border-top-color:#2E75B6; }
  .water-tip-hint{
    font-family:'Oswald', sans-serif; font-size:9px; text-transform:uppercase; letter-spacing:0.04em;
    color:#2E75B6; padding:5px 10px 7px; border-top:1px solid #E3DBC2; margin-top:2px;
  }
  .water-popup-title{ color:#1E5A8A !important; }
  .water-popup-link{
    display:inline-block; margin-top:6px; font-family:'Oswald', sans-serif; font-size:11px;
    text-transform:uppercase; letter-spacing:0.05em; color:#fff !important; background:#2E75B6;
    padding:7px 12px; border-radius:4px; text-decoration:none; font-weight:600;
  }
  .water-popup-link:hover{ background:#1E5A8A; }
  .water-tip-photo{
    width:100%; height:90px; object-fit:cover; display:block;
    background:linear-gradient(135deg, #D8CFAF, #C9C2A8);
  }
  .water-tip-body{ padding:8px 10px; }
  .water-tip-name{
    font-family:'Oswald', sans-serif; font-weight:600; font-size:12.5px; color:#1E5A8A; margin-bottom:2px;
  }
  .water-tip-desc{ font-size:11.5px; line-height:1.4; margin-bottom:5px; }
  .water-tip-dist{
    font-family:'Oswald', sans-serif; font-size:9.5px; text-transform:uppercase; letter-spacing:0.03em;
    color:var(--grey);
  }
  .water-tip-confidence{
    display:inline-block; margin-top:4px; font-family:'Oswald', sans-serif; font-size:8.5px;
    text-transform:uppercase; letter-spacing:0.05em; color:#2E75B6;
  }

  @media (max-width:640px){
    header{ padding:0 14px; }
    header .title-block h1{ font-size:16px; }
    header .title-block p{ font-size:11px; }
    header .stats{ gap:12px; }
    header .stats .num{ font-size:16px; }
    header .right-side{ gap:12px; }
    nav.tabs a{ padding:6px 9px; font-size:10px; }
    .legend{ max-width:140px; padding:10px 12px; bottom:12px; left:12px;}
    .hint{ display:none; }
    #map{ top:78px; }
    header{ height:78px; }
  }
</style>
</head>
<body>

<div id="map"></div>

    <span class="label">RV water fill<span class="sub">click to show</span></span>
  </div>
</div>

<div class="hint">Click any stop for details &middot; swipe photos to browse</div>

const colors = {
  park:"#2F4A34", climb:"#C1502E", city:"#3B6E7E", transit:"#8A8272"
};

const map = L.map('map', { zoomControl:true }).setView([48, -122], 5);

// Road map basemap (CARTO Voyager — free, no key, road-focused)
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  maxZoom: 19,
  subdomains: 'abcd',
  attribution: '© OpenStreetMap contributors © <a href="https://carto.com/attributions">CARTO</a>'
}).addTo(map);

function galleryHtml(imgUrls){
  if(!imgUrls || !imgUrls.length) return '';
  const slides = imgUrls.map(u => `<img class="popup-photo" src="${u}" loading="lazy">`).join('');
  const arrows = imgUrls.length > 1
    ? `<button type="button" class="gallery-arrow prev" aria-label="Previous photo" onclick="this.closest('.popup-gallery').querySelector('.gallery-track').scrollBy({left:-270,behavior:'smooth'})">&#8249;</button>
       <button type="button" class="gallery-arrow next" aria-label="Next photo" onclick="this.closest('.popup-gallery').querySelector('.gallery-track').scrollBy({left:270,behavior:'smooth'})">&#8250;</button>`
    : '';
  const dots = imgUrls.length > 1
    ? `<div class="gallery-dots">${imgUrls.map((_, i) => `<span class="dot${i === 0 ? ' active' : ''}"></span>`).join('')}</div>`
    : '';
  return `<div class="popup-gallery"><div class="gallery-track">${slides}</div>${arrows}${dots}</div>`;
}

function popupHtml(s, idx, imgUrls){
  const fromRow = s.from ? `<div><span class="stat-lbl">From last stop</span><span class="stat-val">${s.from}</span></div>` : `<div><span class="stat-lbl">From last stop</span><span class="stat-val">— start —</span></div>`;
  const toRow = s.to ? `<div><span class="stat-lbl">To next stop</span><span class="stat-val">${s.to}</span></div>` : `<div><span class="stat-lbl">To next stop</span><span class="stat-val">— trip end —</span></div>`;
  const nightsLabel = s.nights === 0 ? "Pass through" : (s.nights === 1 ? "1 night" : `${s.nights} nights`);
  const actItems = s.activities.map(a => `<li>${a}</li>`).join('');
  return `
    ${galleryHtml(imgUrls)}
    <div class="popup-body">
      <div class="popup-eyebrow">Stop ${idx+1} of ${stops.length}</div>
      <div class="popup-title">${s.name}</div>
      <div class="popup-dates">${s.dates} &middot; ${nightsLabel}</div>
      <div class="popup-stats">
        ${fromRow}
        ${toRow}
      </div>
      <div class="popup-activities-lbl">Do</div>
      <ul class="popup-activities">${actItems}</ul>
    </div>
  `;
}

function tooltipHtml(s, imgUrl){
  const thumb = imgUrl ? `<img class="tooltip-thumb" src="${imgUrl}" alt="">` : '';
  return `${thumb}<span>${s.name}</span>`;
}

// Sync the gallery dots to whichever photo is scrolled into view

});

// Fetch a few representative photos for each stop from Wikipedia's public REST API
// (CORS-enabled, no key required). Falls back to a single summary thumbnail, then gracefully to none.
async function loadStopImages(title){
  try{
    const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/media-list/${title}`);
    if(res.ok){
      const data = await res.json();
      const imgs = (data.items || [])
        .filter(it => it.type === 'image' && it.srcset && it.srcset.length && !/\.svg$/i.test(it.title || ''))
        .map(it => {
          const src = it.srcset[it.srcset.length - 1].src;
          return src.startsWith('//') ? `https:${src}` : src;
        });
      if(imgs.length) return imgs.slice(0, 8);
    }
  }catch(e){ /* fall through to summary thumbnail */ }
  try{
    const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${title}`);
    if(res.ok){
      const data = await res.json();
      if(data.thumbnail && data.thumbnail.source) return [data.thumbnail.source];
    }
  }catch(e){ /* no image available */ }
  return [];
}

stops.forEach((s, idx) => {
  loadStopImages(s.wiki).then(urls => {
    if(!urls.length) return;
    markers[idx].setTooltipContent(tooltipHtml(s, urls[0]));
    markers[idx].setPopupContent(popupHtml(s, idx, urls));
  });
});

const waterLayer = L.layerGroup();

function waterTooltipHtml(w, imgUrl){
  const photo = imgUrl ? `<img class="water-tip-photo" src="${imgUrl}" loading="lazy">` : '';
  const confidence = w.confidence && w.confidence !== 'verified'
    ? `<span class="water-tip-confidence">${w.confidence === 'likely' ? 'Likely — verify before trip' : 'Unverified — check before relying on it'}</span>`
    : '';
  return `
    ${photo}
    <div class="water-tip-body">
      <div class="water-tip-name">${w.name}</div>
      <div class="water-tip-desc">${w.description}</div>
      <div class="water-tip-dist">${w.milesFromPrev} mi from ${w.nearPrevStop} &middot; ${w.milesFromNext} mi to ${w.nearNextStop}</div>
      ${confidence}
    </div>
    <div class="water-tip-hint">Click for Google Maps link</div>
  `;
}

function waterPopupHtml(w, imgUrl){
  const photoTag = imgUrl ? `<img class="popup-photo" src="${imgUrl}" loading="lazy">` : '';
  const confidenceNote = w.confidence && w.confidence !== 'verified'
    ? `<div class="popup-dates">${w.confidence === 'likely' ? 'Likely real — verify before the trip' : 'Unverified — confirm on the ground before relying on it'}</div>`
    : '';
  const mapsUrl = `https://www.google.com/maps?q=${w.lat},${w.lng}`;
  return `
    ${photoTag}
    <div class="popup-body">
      <div class="popup-eyebrow">RV water fill &middot; not a trip stop</div>
      <div class="popup-title water-popup-title">${w.name}</div>
      <div class="popup-dates">${w.road}</div>
      ${confidenceNote}
      <div class="popup-activities-lbl">Details</div>
      <ul class="popup-activities">
        <li>${w.description}</li>
        <li>${w.milesFromPrev} mi from ${w.nearPrevStop} &middot; ${w.milesFromNext} mi to ${w.nearNextStop}</li>
      </ul>
      <a class="water-popup-link" href="${mapsUrl}" target="_blank" rel="noopener">Open in Google Maps ↗</a>
    </div>
  `;
}
